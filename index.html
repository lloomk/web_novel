<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>암기장 </title>
    <style>
        /* 변수 설정 */
        :root { --primary: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text: #334155; --success: #22c55e; --error: #ef4444; }
        
        /* 기본 스타일 및 모바일 반응형 */
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { width: 100%; max-width: 600px; background: var(--card); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        h1, h2 { text-align: center; color: #1e293b; margin-bottom: 10px; }
        
        /* Inputs & Buttons */
        input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); margin-top: 5px; }
        
        /* Quiz UI */
        .quiz-status { display: flex; justify-content: space-between; color: #64748b; font-size: 0.9rem; margin-bottom: 20px; }
        .question-box { font-size: 1.4rem; font-weight: bold; text-align: center; margin: 30px 0; word-break: keep-all; }
        
        .feedback-area { 
            margin-top: 20px; 
            padding: 15px; 
            border-radius: 8px; 
            text-align: center; 
            min-height: 50px; 
        }
        
        .feedback-area.correct { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
        .feedback-area.wrong { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .correct-answer-display { font-weight: bold; font-size: 1.1rem; margin-top: 5px; }

        /* Helpers */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-view">
        <h1>🔗 구글 시트 연결</h1>
        <p style="text-align:center; color:#64748b; font-size:0.9rem;">시트 공유 설정을 '공개'로 바꾸고, 시트 ID를 입력하세요.</p>
        <input type="text" id="sheet-id-input" placeholder="여기에 시트 ID를 붙여넣으세요">
        <button class="btn" onclick="saveSheetId()">✔️ 시트 ID 저장</button>
        <div id="current-sheet-status" style="margin-top:15px; text-align:center; color:#10b981; font-weight:bold;"></div>

        <h2 style="margin-top:40px;">🔥 퀴즈 시작</h2>
        <button class="btn" style="background:#10b981;" onclick="loadAndStartQuiz()">데이터 로드 및 암기 시작</button>
        
        <p style="margin-top:20px; border-top:1px solid #e2e8f0; padding-top:10px; text-align:center; font-size:0.9rem;">
            <a href="https://docs.google.com/spreadsheets/d/148tD5R801q1J1nL_Yj2nE-o-T2hE7f8y/edit#gid=0" target="_blank">예시 시트 보기</a>
        </p>
    </div>
    
    <div id="loading-view" class="hidden" style="text-align:center; margin-top:50px;">
        <h2 id="loading-message">데이터를 로드하는 중입니다...</h2>
        <div class="loader" style="margin-top:20px;"></div>
    </div>

    <div id="quiz-view" class="hidden">
        <div class="quiz-status">
            <span>남은 문제: <b id="remain-count">0</b></span>
            <span class="badge" id="round-badge">1라운드</span>
        </div>

        <div class="question-box" id="question-display"></div>

        <input type="text" id="quiz-input" placeholder="정답을 입력하세요" autocomplete="off" onkeypress="handleEnter(event, 'submit')">
        
        <button class="btn" id="btn-submit" onclick="submitAnswer()">제출</button>
        <button class="btn hidden" id="btn-next" onclick="nextQuestion()">다음 문제 ➡️</button>

        <div id="feedback" class="feedback-area hidden">
            <div id="feedback-msg"></div>
            <div id="correct-answer-show" class="correct-answer-display"></div>
        </div>
    </div>

    <div id="finish-view" class="hidden" style="text-align:center;">
        <h1 style="font-size:3rem; margin-bottom:0;">🎉</h1>
        <h2>완벽하게 암기했습니다!</h2>
        <p>틀린 문제 없이 모든 과정을 통과하셨습니다.</p>
        <button class="btn" onclick="location.reload()">처음으로 돌아가기</button>
    </div>
</div>

<script>
    // 데이터 저장소
    let allQuestions = []; 
    let quizQueue = [];    
    let retryQueue = [];   
    let currentQ = null;   
    let round = 1;
    let sheetId = '';
    const STORAGE_KEY = 'SpartaSheetId';

    // --- 1. 초기화 및 ID 로드 ---
    window.onload = function() {
        // 로컬 저장소에서 시트 ID 로드
        const savedId = localStorage.getItem(STORAGE_KEY);
        if (savedId) {
            sheetId = savedId;
            document.getElementById('sheet-id-input').value = savedId;
            document.getElementById('current-sheet-status').innerText = '✅ 시트 ID가 저장되었습니다.';
        }
    };

    function saveSheetId() {
        const id = document.getElementById('sheet-id-input').value.trim();
        if(!id) return alert("시트 ID를 입력해주세요.");
        sheetId = id.includes('/d/') ? id.split('/d/')[1].split('/')[0] : id; // 전체 URL이 들어와도 ID만 추출
        localStorage.setItem(STORAGE_KEY, sheetId);
        document.getElementById('current-sheet-status').innerText = '✅ 시트 ID가 성공적으로 저장되었습니다.';
    }

    // --- 2. Sheets 데이터 로드 ---
    async function loadAndStartQuiz() {
        if(!sheetId) {
            alert("시트 ID를 먼저 저장해주세요!");
            return;
        }

        // 로딩 화면 표시
        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('loading-view').classList.remove('hidden');
        document.getElementById('loading-message').innerText = '데이터를 로드하는 중입니다...';

        // Google Sheets API URL (Sheet1의 A열과 B열 데이터)
        const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&tq=SELECT%20A%2C%20B`;

        try {
            const response = await fetch(sheetUrl);
            const dataText = await response.text();
            
            // JSONP 형식의 응답을 JSON 객체로 파싱
            const jsonText = dataText.substring(dataText.indexOf('{'), dataText.lastIndexOf('}') + 1);
            const data = JSON.parse(jsonText);

            // 데이터 추출
            const rows = data.table.rows;
            allQuestions = [];
            
            // 첫 번째 행은 헤더이므로 스킵
            for (let i = 1; i < rows.length; i++) {
                const q = rows[i].c[0]?.v; // A열 (문제)
                const a = rows[i].c[1]?.v; // B열 (정답)
                
                if (q && a) {
                    allQuestions.push({ q: q.toString().trim(), a: a.toString().trim() });
                }
            }

            if (allQuestions.length === 0) {
                throw new Error("시트에서 유효한 문제-정답 쌍을 찾을 수 없습니다. 시트가 비어 있거나 공유 설정이 잘못되었을 수 있습니다.");
            }

            // 로딩 화면 숨기고 퀴즈 시작
            document.getElementById('loading-view').classList.add('hidden');
            startQuizInit();

        } catch (error) {
            console.error("데이터 로드 실패:", error);
            document.getElementById('loading-message').innerText = `❌ 데이터 로드 실패: ${error.message}`;
            document.getElementById('setup-view').classList.remove('hidden');
            document.getElementById('loading-view').classList.add('hidden');
            alert("데이터 로드에 실패했습니다. 시트 ID와 '공개 공유 설정'을 다시 확인해주세요.");
        }
    }

    // --- 3. 퀴즈 로직 (동일) ---
    function handleEnter(e, type) {
        if(e.key === 'Enter') {
            if(type === 'submit') submitAnswer();
        }
    }

    function startQuizInit() {
        if(allQuestions.length === 0) return alert("데이터 없음");
        
        quizQueue = [...allQuestions]; 
        retryQueue = [];
        round = 1;

        document.getElementById('setup-view').classList.add('hidden');
        document.getElementById('quiz-view').classList.remove('hidden');
        
        loadNextQuestion();
    }

    function loadNextQuestion() {
        // 큐가 비었으면 라운드 체크
        if(quizQueue.length === 0) {
            if(retryQueue.length === 0) {
                // 완전 종료
                document.getElementById('quiz-view').classList.add('hidden');
                document.getElementById('finish-view').classList.remove('hidden');
                return;
            } else {
                // 다음 라운드 시작 (틀린 문제만 다시)
                quizQueue = [...retryQueue];
                retryQueue = [];
                round++;
                alert(`🔄 ${round}라운드 시작! 틀린 문제만 다시 풉니다.`);
            }
        }

        // 문제 로드
        currentQ = quizQueue.shift(); 
        
        // UI 업데이트
        document.getElementById('round-badge').innerText = round + "라운드";
        document.getElementById('remain-count').innerText = quizQueue.length + 1;
        document.getElementById('question-display').innerText = currentQ.q;
        
        // 입력창 초기화
        const input = document.getElementById('quiz-input');
        input.value = '';
        input.disabled = false;
        input.focus();
        
        // 버튼 및 피드백 상태 초기화
        document.getElementById('btn-submit').classList.remove('hidden');
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('feedback').classList.add('hidden'); 
        document.getElementById('feedback').className = 'feedback-area hidden'; 
    }

function submitAnswer() {
    const input = document.getElementById('quiz-input');
    const userAns = input.value.trim();
    const correctAns = currentQ.a.trim();
    
    if(!userAns) return; 

    input.disabled = true;

    const feedback = document.getElementById('feedback');
    const feedbackMsg = document.getElementById('feedback-msg');
    const correctShow = document.getElementById('correct-answer-show');
    
    feedback.classList.remove('wrong', 'correct'); 

    // 👇 [유연한 채점 로직 추가] 띄어쓰기 및 특수문자 제거 함수
    const cleanText = (str) => {
        // 한글, 영문, 숫자만 남기고 모든 기호와 공백을 제거합니다.
        return str.replace(/[^a-zA-Z0-9가-힣]/g, "").toLowerCase();
    };

    // 정화된 텍스트로 비교 (예: "6.25 전쟁" 과 "625전쟁"을 똑같이 인식)
    if(cleanText(userAns) === cleanText(correctAns)) {
        // 정답
        feedback.classList.add('correct');
        feedbackMsg.innerText = "🙆‍♂️ 정답입니다!";
        correctShow.innerText = ""; 
    } else {
        // 오답
        feedback.classList.add('wrong');
        feedbackMsg.innerText = "🙅‍♂️ 틀렸습니다.";
        // 실제 시트에 적힌 정답을 보여줍니다.
        correctShow.innerText = `정답: ${currentQ.a}`;
        
        retryQueue.push(currentQ);
    }
    
    document.getElementById('btn-submit').classList.add('hidden');
    document.getElementById('btn-next').classList.remove('hidden');
    document.getElementById('btn-next').focus();
    feedback.classList.remove('hidden'); 
}

    function nextQuestion() {
        loadNextQuestion();
    }
</script>
</body>
</html>

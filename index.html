        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>

                    <div class="flex gap-2 p-1 bg-gray-100 rounded-xl">
                        <button id="btn-light" class="px-5 py-2 rounded-lg text-sm font-bold transition-all">라이트</button>

                </div>

                        <option value="font-batang">바탕체</option>
                        <option value="font-myungjo">명조체</option>
                    </select>
                </div>
                <div class="space-y-4">
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-bold text-gray-500 uppercase">크기</span>
                        <span id="font-size-val" class="text-sm font-mono font-bold text-blue-600">18px</span>
                    </div>
                    <input type="range" id="font-size-slider" min="14" max="40" value="18" class="w-full h-1.5 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                </div>
            </div>
            <button id="close-settings" class="w-full py-4 bg-gray-100 rounded-2xl font-bold uppercase tracking-widest text-xs">닫기</button>
        </div>
    </div>

    <script>
        const dbName = "NovelViewerDB_FinalFix";
        const storeName = "novelStore";
        let db;

        const request = indexedDB.open(dbName, 1);
        request.onupgradeneeded = (e) => { e.target.result.createObjectStore(storeName); };
        request.onsuccess = (e) => { db = e.target.result; loadLastSession(); };

        const fileInput = document.getElementById('file-input');
        const contentArea = document.getElementById('content');
        const placeholder = document.getElementById('viewer-placeholder');
        const viewerContainer = document.getElementById('viewer-container');
        const chapterIndicator = document.getElementById('chapter-indicator');
        const pageInfo = document.getElementById('page-info');
        const touchCenter = document.getElementById('touch-center');
        const scrollHint = document.getElementById('scroll-hint');
        
        const settingsPanel = document.getElementById('settings-panel');
        const tocPanel = document.getElementById('toc-panel');
        const overlay = document.getElementById('overlay');
        
        const toggleBtn = document.getElementById('toggle-settings');
        const closeBtn = document.getElementById('close-settings');
        const openTocBtn = document.getElementById('open-toc');
        const closeTocBtn = document.getElementById('close-toc');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const chapterList = document.getElementById('chapter-list');
        const fontFamilySelect = document.getElementById('font-family-select');
        const fontSizeSlider = document.getElementById('font-size-slider');
        const fontSizeVal = document.getElementById('font-size-val');

        let settings = JSON.parse(localStorage.getItem('viewerSettings_v12')) || {
            theme: 'light', fontFamily: 'font-batang', fontSize: 18, uiVisible: true
        };
        let chapters = [];
        let currentChapterIndex = 0;
        let touchStartY = 0;
        const THRESHOLD = 80;

        function applySettings() {
            const isDark = settings.theme === 'dark';
            
            if (isDark) {
                document.documentElement.classList.add('dark');
                document.body.className = 'bg-zinc-950 text-zinc-300 min-h-screen flex flex-col items-center dark';
            } else {
                document.documentElement.classList.remove('dark');
                document.body.className = 'bg-white text-gray-900 min-h-screen flex flex-col items-center';
            }
            
            // 설정창 내부 버튼들 클래스 (보스 요청: 설정창 배경은 하양 고정)
            document.getElementById('btn-light').className = `px-5 py-2 rounded-lg text-sm font-bold transition-all ${!isDark ? 'bg-white shadow-sm text-black' : 'text-gray-400'}`;
            document.getElementById('btn-dark').className = `px-5 py-2 rounded-lg text-sm font-bold transition-all ${isDark ? 'bg-zinc-700 shadow-sm text-white' : 'text-gray-400'}`;
            
            contentArea.classList.remove('font-gulim', 'font-batang', 'font-myungjo');
            contentArea.classList.add(settings.fontFamily);
            fontFamilySelect.value = settings.fontFamily;
            contentArea.style.fontSize = settings.fontSize + 'px';
            fontSizeSlider.value = settings.fontSize;
            fontSizeVal.innerText = settings.fontSize + 'px';
            
            updateUIVisibility();
            localStorage.setItem('viewerSettings_v12', JSON.stringify(settings));
        }

        function updateUIVisibility() {
            const header = document.getElementById('header');
            const bottomNav = document.getElementById('bottom-nav');
            const toggleS = document.getElementById('toggle-settings');
            
            if (settings.uiVisible) {
                header.classList.remove('ui-hidden');
                bottomNav.classList.remove('ui-hidden-bottom');
                toggleS.classList.remove('ui-hidden-right');
            } else {
                header.classList.add('ui-hidden');
                bottomNav.classList.add('ui-hidden-bottom');
                toggleS.classList.add('ui-hidden-right');
            }
        }

        async function saveToDB(data) {
            const tx = db.transaction(storeName, "readwrite");
            tx.objectStore(storeName).put(data, "lastNovel");
        }

        function loadLastSession() {
            const tx = db.transaction(storeName, "readonly");
            const getRequest = tx.objectStore(storeName).get("lastNovel");
            getRequest.onsuccess = () => {
                const data = getRequest.result;
                if (data && data.chapters) {
                    chapters = data.chapters;
                    currentChapterIndex = data.currentIndex || 0;
                    showViewer();
                }
            };
        }

        function buildToc() {
            chapterList.innerHTML = '';
            chapters.forEach((chapter, index) => {
                const item = document.createElement('div');
                item.className = `chapter-item p-6 border-b border-gray-100 cursor-pointer hover:bg-blue-50 flex items-center transition-colors`;
                if (index === currentChapterIndex) {
                    item.classList.add('bg-blue-50', 'text-blue-600', 'font-bold', 'border-l-4', 'border-l-blue-600');
                }
                item.innerText = chapter.title;
                item.onclick = () => { currentChapterIndex = index; renderChapter(); closeToc(); };
                chapterList.appendChild(item);
            });
        }

        function renderChapter() {
            if (chapters.length === 0) return;
            const chapter = chapters[currentChapterIndex];
            contentArea.innerText = chapter.content;
            chapterIndicator.innerText = chapter.title;
            chapterIndicator.classList.remove('hidden');
            pageInfo.innerText = `${currentChapterIndex + 1} / ${chapters.length}`;
            prevBtn.disabled = currentChapterIndex === 0;
            nextBtn.disabled = currentChapterIndex === chapters.length - 1;
            buildToc();
            window.scrollTo({top: 0, behavior: 'instant'});
            saveToDB({ chapters, currentIndex: currentChapterIndex });
        }

        function showViewer() {
            placeholder.classList.add('hidden');
            viewerContainer.classList.remove('hidden');
            openTocBtn.classList.remove('hidden');
            renderChapter();
        }

        function splitChapters(text) {
            const lines = text.split('\n');
            const result = [];
            let currentTitle = "시작";
            let currentBody = [];
            const chapterPattern = /(\d+화|제\s*\d+\s*화)/;
            lines.forEach((line) => {
                const trimmed = line.trim();
                if (chapterPattern.test(trimmed) && trimmed.length < 25) {
                    if (currentBody.length > 0 || currentTitle !== "시작") {
                        result.push({ title: currentTitle, content: currentBody.join('\n').trim() });
                    }
                    currentTitle = trimmed;
                    currentBody = [];
                } else { currentBody.push(line); }
            });
            result.push({ title: currentTitle, content: currentBody.join('\n').trim() });
            return result;
        }

        function closeToc() {
            tocPanel.classList.add('hidden-panel-right');
            overlay.classList.add('hidden');
        }

        window.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].pageY; }, { passive: true });
        window.addEventListener('touchmove', (e) => {
            if (chapters.length === 0) return;
            const touchY = e.touches[0].pageY;
            const pullDistance = touchY - touchStartY;
            const isAtTop = window.scrollY <= 0;
            const isAtBottom = window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 1;

            if (isAtBottom && pullDistance < -THRESHOLD && currentChapterIndex < chapters.length - 1) {
                scrollHint.innerText = "다음 회차로 넘어갑니다";
                scrollHint.style.top = "auto";
                scrollHint.style.bottom = "120px";
                scrollHint.style.opacity = "1";
            } else if (isAtTop && pullDistance > THRESHOLD && currentChapterIndex > 0) {
                scrollHint.innerText = "이전 회차로 넘어갑니다";
                scrollHint.style.bottom = "auto";
                scrollHint.style.top = "120px";
                scrollHint.style.opacity = "1";
            } else { scrollHint.style.opacity = "0"; }
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            const touchY = e.changedTouches[0].pageY;
            const pullDistance = touchY - touchStartY;
            const isAtTop = window.scrollY <= 0;
            const isAtBottom = window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 1;

            if (isAtBottom && pullDistance < -THRESHOLD && currentChapterIndex < chapters.length - 1) {
                currentChapterIndex++; renderChapter();
            } else if (isAtTop && pullDistance > THRESHOLD && currentChapterIndex > 0) {
                currentChapterIndex--; renderChapter();
            }
            scrollHint.style.opacity = "0";
        });

        window.addEventListener('wheel', (e) => {
            if (chapters.length === 0) return;
            const isAtTop = window.scrollY <= 0;
            const isAtBottom = window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 1;
            if (isAtBottom && e.deltaY > 150 && currentChapterIndex < chapters.length - 1) {
                currentChapterIndex++; renderChapter();
            } else if (isAtTop && e.deltaY < -150 && currentChapterIndex > 0) {
                currentChapterIndex--; renderChapter();
            }
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                chapters = splitChapters(event.target.result);
                currentChapterIndex = 0;
                showViewer();
            };
            reader.readAsText(file);
        });

        touchCenter.addEventListener('click', () => { settings.uiVisible = !settings.uiVisible; applySettings(); });
        prevBtn.addEventListener('click', () => { if (currentChapterIndex > 0) { currentChapterIndex--; renderChapter(); } });
        nextBtn.addEventListener('click', () => { if (currentChapterIndex < chapters.length - 1) { currentChapterIndex++; renderChapter(); } });
        
        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsPanel.classList.remove('hidden-panel-bottom');
            overlay.classList.remove('hidden');
        });
        
        closeBtn.addEventListener('click', () => {
            settingsPanel.classList.add('hidden-panel-bottom');
            overlay.classList.add('hidden');
        });
        
        openTocBtn.addEventListener('click', () => {
            tocPanel.classList.remove('hidden-panel-right');
            overlay.classList.remove('hidden');
        });
        
        closeTocBtn.addEventListener('click', closeToc);
        
        overlay.addEventListener('click', () => {
            closeToc();
            settingsPanel.classList.add('hidden-panel-bottom');
            overlay.classList.add('hidden');
        });

        document.getElementById('btn-light').addEventListener('click', () => { settings.theme = 'light'; applySettings(); });
        document.getElementById('btn-dark').addEventListener('click', () => { settings.theme = 'dark'; applySettings(); });
        fontFamilySelect.addEventListener('change', (e) => { settings.fontFamily = e.target.value; applySettings(); });
        fontSizeSlider.addEventListener('input', (e) => { settings.fontSize = e.target.value; applySettings(); });
        
        applySettings();
    </script>
</body>
</html>
